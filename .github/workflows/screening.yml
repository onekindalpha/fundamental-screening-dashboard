name: Daily Stock Screening

on:
  workflow_dispatch:
  schedule:
    # 16:00 KST, weekdays = 07:00 UTC, Mon-Fri
    - cron: "0 7 * * 1-5"

permissions:
  contents: write

jobs:
  screening:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run KOSPI 200 screener
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          python -u kr_lynch_screener_one_shot_powerfix_rulefit_mirae_capadj_lynch333_v3_graham_fixed3_narrowdebt.py \
            --dart-key "$DART_API_KEY" \
            --bsns-year 2025 \
            --codes "$(paste -sd, kospi_codes_manual_fixed_v2.txt)" \
            --tsv \
            --out "daily_국장_코스피200_스크리닝.tsv"

      - name: Run KOSDAQ 150 screener
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          python -u kr_lynch_screener_one_shot_powerfix_rulefit_mirae_capadj_lynch333_v3_graham_fixed3_narrowdebt.py \
            --dart-key "$DART_API_KEY" \
            --bsns-year 2025 \
            --codes "$(paste -sd, kosdaq_codes_manual_fixed_v2.txt)" \
            --tsv \
            --out "daily_국장_코스닥150_스크리닝.tsv"

      - name: Prepare dashboard result files
        run: |
          mkdir -p results
          TODAY=$(TZ=Asia/Seoul date +%Y%m%d)

          rm -f results/kospi_screening_*_checked.tsv results/kospi_screening_*_sorted.tsv
          rm -f results/kosdaq_screening_*_checked.tsv results/kosdaq_screening_*_sorted.tsv

          if [ -f "daily_국장_코스피200_스크리닝_raw.tsv" ]; then
            cp "daily_국장_코스피200_스크리닝_raw.tsv" "results/kospi_screening_${TODAY}_checked.tsv"
          else
            cp "daily_국장_코스피200_스크리닝.tsv" "results/kospi_screening_${TODAY}_checked.tsv"
          fi

          if [ -f "daily_국장_코스닥150_스크리닝_raw.tsv" ]; then
            cp "daily_국장_코스닥150_스크리닝_raw.tsv" "results/kosdaq_screening_${TODAY}_checked.tsv"
          else
            cp "daily_국장_코스닥150_스크리닝.tsv" "results/kosdaq_screening_${TODAY}_checked.tsv"
          fi

          python process_screening.py

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: screening-results-${{ github.run_id }}
          path: results/*.tsv
          retention-days: 14

      - name: Commit and push updated results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add results/*.tsv
          if git diff --cached --quiet; then
            echo "No result changes to commit."
          else
            git commit -m "Update daily screening results"
            git push
          fi
